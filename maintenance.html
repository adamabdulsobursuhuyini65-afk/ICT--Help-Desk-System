<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance Records</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>Maintenance Records</h1>
</header>

<nav class="navbar">

    <div class="nav-links">
        <a href="index.html">Dashboard</a>
        <a href="assets.html">Assets</a>
        <a href="tickets.html">Tickets</a>
        <a href="maintenance.html" class="active">Maintenance</a>
    </div>

    <div id="datetime"></div>

</nav>

<div style="padding:20px;">

    <h2>Add Maintenance Record</h2>

    <input type="text" id="assetId" placeholder="Asset ID">

    <input type="text" id="fault" placeholder="Fault Description">

    <input type="text" id="actionTaken" placeholder="Action Taken">

    <input type="text" id="technician" placeholder="Technician Name">

    <button onclick="addMaintenance()">
        Save Record
    </button>

    <br><br>

    <table border="1" width="100%">
        <thead>
            <tr>
                <th>Asset ID</th>
                <th>Fault</th>
                <th>Action Taken</th>
                <th>Technician</th>
                <th>Delete</th>
            </tr>
        </thead>

        <tbody id="maintenanceTable"></tbody>
    </table>

</div>

<footer>
<p>Developed by Adam Abdul Sobur(Industrial Attachment Student)</p>
</footer>

<script src="js/maintenance.js">
    const themeToggle =
document.getElementById("themeToggle");

const body =
document.body;

let darkMode =
localStorage.getItem("darkMode");

if(darkMode === "enabled"){

    body.classList.add("dark-mode");

    themeToggle.src =
    "images/sun.png";

}

themeToggle.addEventListener("click",()=>{

    body.classList.toggle("dark-mode");

    if(body.classList.contains("dark-mode")){

        localStorage.setItem(
            "darkMode",
            "enabled"
        );

        themeToggle.src =
        "images/sun.png";

    }
    else{

        localStorage.setItem(
            "darkMode",
            "disabled"
        );

        themeToggle.src =
        "images/moon.png";

    }

});
</script>

</body>
</html>
