<!DOCTYPE html>
<html>
<head>
<title>Assets</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>Asset Management</h1>
</header>

<nav class="navbar">

    <div class="nav-links">
        <a href="index.html">Dashboard</a>
        <a href="assets.html" class="active">Assets</a>
        <a href="tickets.html">Tickets</a>
        <a href="maintenance.html">Maintenance</a>
    </div>

    <div id="datetime"></div>

</nav>
<div id="message"></div>

<div style="padding:20px">

<input type="text" id="assetName"
placeholder="Asset Name">

<select id="assetStatus">
<option>Working</option>
<option>Faulty</option>
<option>Maintenance</option>
</select>

<button onclick="addAsset()">
Add Asset
</button>

<br><br>
<input type="text" id="searchAsset" placeholder="Search Asset..." onkeyup="searchAssets()">

<button onclick="exportCSV()">Export Assets</button>

<table border="1" width="100%">
<thead>
<tr>
<th>Assest ID</th>
<th>Name</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="assetTable">
</tbody>

</table>

</div>
<footer>

<p>
Developed by Adam Abdul Sobur
(Industrial Attachment Student)
</p>

</footer>

<script src="js/assets.js">

const themeToggle =
document.getElementById("themeToggle");

const body =
document.body;

let darkMode =
localStorage.getItem("darkMode");

if(darkMode === "enabled"){

    body.classList.add("dark-mode");

    themeToggle.src =
    "images/sun.png";

}

themeToggle.addEventListener("click",()=>{

    body.classList.toggle("dark-mode");

    if(body.classList.contains("dark-mode")){

        localStorage.setItem(
            "darkMode",
            "enabled"
        );

        themeToggle.src =
        "images/sun.png";

    }
    else{

        localStorage.setItem(
            "darkMode",
            "disabled"
        );

        themeToggle.src =
        "images/moon.png";

    }

});
</script>

</body>
</html>
