<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICT Help Desk & Asset Management System</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-page">
<header class="main-header">
 <div class="logo-section">
        <img src="images/logo.jpeg" alt="Logo" class="logo">
        <div class="header-text">
            <h1>CSIR-Savannah Agricultural Research Institute</h1>
            <p>ICT Help Desk & Asset Management System</p>
        </div>

<div class="header-icons">
            <div class="theme-btn" id="themeBtn">
            <img src="images/moon.png" id="themeToggle" class="theme-icon" alt="Theme Toggle">
         </div>

<div class="menu-btn">
 <img src="images/hamburger.png" id="hamburger" class="menu-icon">
</div>

<div id="dropdownMenu" class="dropdown-menu">
    <a href="upload.html">Upload</a>
    <a href="reports.html">Reports</a>
    <a href="contact.html">Contact</a>
    <a href="About.html">About</a>
</div>

        </div>

    </div>

</header>
<nav class="navbar">

    <div class="nav-links">
        <a href="index.html" class="active">Dashboard</a>
        <a href="assets.html">Assets</a>
        <a href="tickets.html">Tickets</a>
        <a href="maintenance.html">Maintenance</a>
        <a href="reports.html">Reports</a>
    </div>

    <div id="datetime"></div>

</nav>
<div class="content">
<h3 id="datetime"></h3>
</div>

<div class="container">

    <div class="card">
        <h2>Total Assets</h2>
        <p id="totalAssets">0</p>
    </div>

    <div class="card">
        <h2>Total Tickets</h2>
        <p id="totalTickets">0</p>
    </div>

    <div class="card">
        <h2>Maintenance Records</h2>
        <p id="totalMaintenance">0</p>
    </div>

</div>

<script>
document.getElementById("totalAssets").textContent =
JSON.parse(localStorage.getItem("assets"))?.length || 0;

document.getElementById("totalTickets").textContent =
JSON.parse(localStorage.getItem("tickets"))?.length || 0;

document.getElementById("totalMaintenance").textContent =
JSON.parse(localStorage.getItem("maintenance"))?.length || 0;

function updateTime(){

document.getElementById(
"datetime"
).innerHTML =
new Date().toLocaleString();

}

setInterval(
updateTime,
1000
);

updateTime();

const images = [
    "images/bg1.jpeg",
    "images/bg2.jpg",
    "images/bg3.jpg",
    "images/bg4.jpg",
    "images/bg5.jpg",
    "images/bg6.jpg",
    "images/bg7.jpg",
    "images/bg8.jpg",
    "images/logo.jpeg",
    "images/bg9.jpg",
    "images/bg10.jpg",
    "images/bg11.jpg",
    "images/bg12.jpg",
    "images/bg13.jpg",
    "images/bg14.jpeg",
    "images/bg15.jpg",
    "images/bg16.jpeg",
    "images/bg17.jpg",
    "images/bg18.jpg",
    "images/bg19.jpg",
    


    
];

let current = 0;

function changeBackground(){

    document.body.style.backgroundImage =
        `url('${images[current]}')`;

    current++;

    if(current >= images.length){
        current = 0;
    }
}

changeBackground();

setInterval(changeBackground, 5000);


const themeToggle =
document.getElementById("themeToggle");

const body =
document.body;

let darkMode =
localStorage.getItem("darkMode");

if(darkMode === "enabled"){

    body.classList.add("dark-mode");

    themeToggle.src =
    "images/sun.png";

}

themeToggle.addEventListener("click",()=>{

    body.classList.toggle("dark-mode");

    if(body.classList.contains("dark-mode")){

        localStorage.setItem(
            "darkMode",
            "enabled"
        );

        themeToggle.src =
        "images/sun.png";

    }
    else{

        localStorage.setItem(
            "darkMode",
            "disabled"
        );

        themeToggle.src =
        "images/moon.png";

    }

});

const hamburger =
document.getElementById("hamburger");

const dropdown =
document.getElementById("dropdownMenu");

hamburger.addEventListener("click",()=>{

    dropdown.classList.toggle("show");

});

document.addEventListener("click",(e)=>{

    if(
        !hamburger.contains(e.target)
        &&
        !dropdown.contains(e.target)
    ){

        dropdown.classList.remove("show");

    }

});

</script>

</body>
</html>
